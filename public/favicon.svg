<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Moorland Heather sweep, matching the v2 hero gradient. -->
    <linearGradient id="jh" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a877bf" />
      <stop offset="1" stop-color="#7a4988" />
    </linearGradient>
  </defs>
  <!-- Sheffield Steel background (v2 color-background). -->
  <rect width="512" height="512" rx="96" fill="#1a1b1e" />
  <text x="256" y="360"
        font-family="'JetBrains Mono', ui-monospace, 'SF Mono', monospace"
        font-size="280" font-weight="700"
        text-anchor="middle"
        letter-spacing="-8"
        fill="url(#jh)">JH</text>
</svg>
